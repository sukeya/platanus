[project]
site_name = "platanus"
site_url = "https://sukeya.github.io/platanus/"
repo_url = "https://github.com/sukeya/platanus"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
nav = [
  { "Home" = "index.md" },
  { "Reference" = [
    { "btree_set" = "reference/btree_set.md" },
    { "btree_multiset" = "reference/btree_multiset.md" },
    { "btree_map" = "reference/btree_map.md" },
    { "btree_multimap" = "reference/btree_multimap.md" }
  ] }
]
[project.theme]
features = [
  "content.code.copy",
  "content.action.edit",
  "toc.integrate",
  "navigation.top"
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.zensical.extensions.glightbox]
